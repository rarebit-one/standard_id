name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.3
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Scan for security vulnerabilities in code
        run: bin/brakeman --no-pager

      - name: Scan for vulnerable gems
        run: bundle exec bundler-audit --update

  test-matrix:
    name: test (${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ["4.0.0", "4.0.1", "4.0.2", "4.0.3"]

    # services:
    #  redis:
    #    image: redis
    #    ports:
    #      - 6379:6379
    #    options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libyaml-dev pkg-config google-chrome-stable

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          # REDIS_URL: redis://localhost:6379/0
        run: |
          bin/rails db:test:prepare
          bin/rails app:tailwindcss:build
          bundle exec rspec

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots-${{ matrix.ruby }}
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  # Aggregator that fans the matrix into a single required status check.
  # Branch protection on `main` requires a check literally named "test"; matrix
  # jobs publish "test (4.0.0)" etc. which don't match.
  #
  # Run regardless of test-matrix result so a failing leg fails this aggregator
  # instead of skipping it. Without `if: always()` a failing matrix leg would
  # skip this job, and GitHub's required-check semantics around skipped checks
  # are ambiguous enough that we'd rather fail loud. `success` and `skipped`
  # both count as passing; anything else fails the aggregator. Mirrors the
  # `test` aggregator in `rarebit-one/.github`'s reusable-gem-ci.yml@v1.
  test:
    needs: test-matrix
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check matrix result
        env:
          MATRIX_RESULT: ${{ needs.test-matrix.result }}
        run: |
          case "$MATRIX_RESULT" in
            success|skipped)
              echo "test-matrix: $MATRIX_RESULT"
              ;;
            *)
              echo "test-matrix failed: $MATRIX_RESULT"
              exit 1
              ;;
          esac

  test-rails-edge:
    # Early-warning canary against Rails `main`. Non-blocking: this job is allowed
    # to fail without breaking PRs. The point is to surface upstream breakage in
    # development rather than at a host app's `bundle update` after a Rails 9
    # release. The widened `>= 8.0` constraint in standard_id.gemspec means
    # Rails 9+ will be auto-resolved by host bundlers once published, so we want
    # to know about incompatibilities early.
    name: test (rails-edge)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libyaml-dev pkg-config google-chrome-stable

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Pin Rails to main in Gemfile
        run: |
          cat >> Gemfile <<'RUBY'

          # Override Rails to edge for the rails-edge canary job (CI only).
          gem "rails", github: "rails/rails", branch: "main"
          RUBY
          # Drop the lockfile so bundler resolves edge versions cleanly.
          rm -f Gemfile.lock

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: false

      - name: Install dependencies against Rails edge
        run: bundle install --jobs 4 --retry 3

      - name: Run tests against Rails edge
        env:
          RAILS_ENV: test
        run: |
          bin/rails db:test:prepare
          bin/rails app:tailwindcss:build
          bundle exec rspec

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots-rails-edge
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
