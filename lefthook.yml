# Lefthook manages git hooks for pre-push checks.
#
# Install:  brew install lefthook && lefthook install
# Skip:     LEFTHOOK=0 git push

pre-push:
  parallel: true
  commands:
    whitespace:
      run: git log --check $(git merge-base origin/main HEAD)..HEAD
    signed-commits:
      run: .lefthook/verify-signatures.sh
    rubocop:
      run: bin/rubocop
      glob: "**/*.rb"
    brakeman:
      # Requires bin/brakeman from chore/standardize-workflows PR
      run: bin/brakeman --no-pager
      glob: "**/*.rb"
    rspec:
      run: bundle exec rspec --fail-fast
      glob: "**/*.rb"

post-checkout:
  commands:
    bundle-sync:
      run: .lefthook/bundle-sync.sh {0} {1} {2}

post-rewrite:
  commands:
    bundle-sync:
      run: .lefthook/bundle-sync.sh

post-merge:
  commands:
    bundle-sync:
      run: .lefthook/bundle-sync.sh
